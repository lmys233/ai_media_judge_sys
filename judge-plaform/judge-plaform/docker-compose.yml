version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: judge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: judge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: judge-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"   # etcd 客户端端口

  milvus:
    image: milvusdb/milvus:v2.6.13
    container_name: judge-milvus
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin123
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # Milvus 服务端口
      - "9091:9091"     # Milvus WebUI 端口
    depends_on:
      - etcd
      - minio
  # Milvus 的可视化管理工具
  attu:
    image: zilliz/attu:v2.6.0
    container_name: judge-attu
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"     # Attu Web UI 端口
    depends_on:
      - milvus
volumes:
  rabbitmq_data:
  minio_data:
  etcd_data:
  milvus_data:
